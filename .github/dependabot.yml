# Keep cargo deps and GitHub Action versions current. Weekly to avoid noise.

version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      patch-updates:
        update-types: [patch]
      minor-updates:
        update-types: [minor]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
