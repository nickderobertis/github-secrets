# Prove the artifact from a clean checkout: bootstrap, then the full gate.
#
# CI must reproduce what a future maintainer or user hits on a fresh machine —
# not a developer's warm local environment. The single required gate is
# `just bootstrap` (clean install) then `just check` (format check, clippy,
# unit + integration, and e2e).

name: ci

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Cache Cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Bootstrap
        run: just bootstrap

      - name: Check
        run: just check

  build:
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

  # Live e2e tests against the real GitHub API. Only runs when the repo has a
  # `GH_E2E_TOKEN` secret available (it's not on PRs from forks). One OS is
  # enough — the live suite proves real network behavior, not portability.
  live-e2e:
    needs: check
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Cache Cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Bootstrap
        run: just bootstrap

      - name: Live e2e (GitHub)
        env:
          GH_TOKEN: ${{ secrets.GH_E2E_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_E2E_TOKEN not configured; skipping GitHub live e2e."
            exit 0
          fi
          just test-live

  # Live e2e against a real, isolated Bitwarden account. Kept a separate job (not
  # a step in live-e2e) so it is an independent required check, decoupled from the
  # GitHub live test. Runs only when the isolated account's api-key credentials
  # are configured as repo secrets; the guard lives in the run script (the
  # `secrets` context is not allowed in a job/step `if:`), so it is skipped — not
  # failed — when they're absent, keeping forks and unconfigured repos green.
  live-e2e-bitwarden:
    needs: check
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Cache Cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Bootstrap
        run: just bootstrap

      - name: Live e2e (Bitwarden)
        env:
          GH_SECRETS_BW_E2E_CLIENT_ID: ${{ secrets.GH_SECRETS_BW_E2E_CLIENT_ID }}
          GH_SECRETS_BW_E2E_CLIENT_SECRET: ${{ secrets.GH_SECRETS_BW_E2E_CLIENT_SECRET }}
          GH_SECRETS_BW_E2E_PASSWORD: ${{ secrets.GH_SECRETS_BW_E2E_PASSWORD }}
        run: |
          if [ -z "$GH_SECRETS_BW_E2E_CLIENT_ID" ]; then
            echo "GH_SECRETS_BW_E2E_* not configured; skipping Bitwarden live e2e."
            exit 0
          fi
          npm install -g @bitwarden/cli
          just test-live-bitwarden
