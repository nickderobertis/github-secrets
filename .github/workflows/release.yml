# Release: build the `gh-secrets` binary for every supported target, package
# it with the README + LICENSE, attach a SHA-256 checksum, and upload to a
# GitHub Release. Optionally publishes to crates.io when CARGO_REGISTRY_TOKEN
# is configured on the repo.
#
# Trigger: push a tag matching `v*.*.*`. The tag IS the version — bump
# `version` in `Cargo.toml` to match, commit, then `git tag vX.Y.Z && git
# push --tags`.

name: release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          # x86_64-apple-darwin is omitted: macos-13 runner allocation has been
          # unreliable since GitHub announced its deprecation, and Apple Silicon
          # Macs can run the aarch64 binary natively. Add this target back once
          # we have a stable Intel build path (or cross from arm64 via Zig/cc).
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          dist="gh-secrets-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$dist"
          cp "target/${{ matrix.target }}/release/gh-secrets" "$dist/"
          cp README.md LICENSE "$dist/"
          tar czf "${dist}.tar.gz" "$dist"
          shasum -a 256 "${dist}.tar.gz" > "${dist}.tar.gz.sha256"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $dist = "gh-secrets-$($env:GITHUB_REF_NAME)-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/gh-secrets.exe" "$dist/"
          Copy-Item README.md, LICENSE "$dist/"
          Compress-Archive -Path $dist -DestinationPath "${dist}.zip"
          $hash = (Get-FileHash "${dist}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${dist}.zip" | Out-File -Encoding ascii "${dist}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: |
            gh-secrets-*.tar.gz
            gh-secrets-*.tar.gz.sha256
            gh-secrets-*.zip
            gh-secrets-*.zip.sha256
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/gh-secrets-*.tar.gz
            artifacts/gh-secrets-*.tar.gz.sha256
            artifacts/gh-secrets-*.zip
            artifacts/gh-secrets-*.zip.sha256

  # Optional: publishes to crates.io when a CARGO_REGISTRY_TOKEN secret exists.
  # No-op (with an explanatory log line) when the secret is absent, so this job
  # never blocks a release.
  crates-io:
    name: publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish (if configured)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN not configured; skipping crates.io publish."
            exit 0
          fi
          cargo publish --locked
