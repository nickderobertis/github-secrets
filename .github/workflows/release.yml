# Automated, conventional-commit-driven releases.
#
# Flow: every push to `master` runs release-please. It keeps an open "release
# PR" that accumulates the pending changelog and the next `Cargo.toml` version
# derived from the conventional commits since the last release. That PR has
# auto-merge enabled (see the step below), so once its required checks pass it
# merges itself with no human click; the merge bumps the version, tags
# `vX.Y.Z`, and cuts the GitHub Release. The same run then builds the
# per-target binaries and attaches them (plus SHA-256 sums) to that release,
# and publishes to crates.io when configured. Net effect: merging one feature
# or fix PR is the only manual step in shipping a release.
#
# This is deliberately a single workflow: a tag pushed by the default
# GITHUB_TOKEN does NOT trigger a separate tag-listening workflow, so the build
# is chained off the release-please job's `release_created` output instead of a
# `push: tags` trigger.

name: release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # Use a PAT so the release PR is opened by a real user, not the
          # GITHUB_TOKEN bot. PRs opened by GITHUB_TOKEN do NOT trigger the
          # `pull_request` CI/lint workflows, so their required checks never
          # run and auto-merge can never fire. A PAT-opened PR triggers CI like
          # any other, so auto-merge works. Falls back to GITHUB_TOKEN when the
          # secret is unset (release PR then still works, but must be merged
          # manually). See "Releases and CI secrets" in AGENTS.md.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

      # Turn on auto-merge for the open release PR so the whole release is
      # hands-off: once the required checks pass, GitHub merges it, and that
      # merge is what this workflow re-runs on to cut the tag/release. We must
      # use the PAT, not GITHUB_TOKEN, for two linked reasons: the release PR's
      # required checks only run because a real-user token opened it, and the
      # eventual auto-merge has to be attributed to that same user so the push
      # to `master` triggers `release` again — a GITHUB_TOKEN merge is ignored
      # by Actions and would strand the release at "PR merged, never tagged".
      # `pr` is set whenever release-please opened/updated a release PR this
      # run; without the PAT we skip and the PR is merged by hand (the prior
      # behavior). See "Releases and CI secrets" in AGENTS.md.
      - name: Enable auto-merge on the release PR
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          # The runner evaluates step `env` templates even when `if` is false,
          # so a bare fromJson() here fails the whole job on every run where
          # release-please opened no PR (exactly the release-cut runs, which
          # then never reach `build` — a release with no assets). Short-circuit
          # so fromJson never sees an empty string.
          PR_NUMBER: ${{ steps.release.outputs.pr && fromJson(steps.release.outputs.pr).number || '' }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "RELEASE_PLEASE_TOKEN not set; leaving the release PR for a manual merge."
            exit 0
          fi
          gh pr merge "$PR_NUMBER" --auto --squash --repo "$GITHUB_REPOSITORY"

  build:
    name: build (${{ matrix.target }})
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          # x86_64-apple-darwin is omitted: macos-13 runner allocation has been
          # unreliable since GitHub announced its deprecation, and Apple Silicon
          # Macs can run the aarch64 binary natively. Add this target back once
          # we have a stable Intel build path (or cross from arm64 via Zig/cc).
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      # Build the exact tagged commit rather than master's HEAD.
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        env:
          VERSION: ${{ needs.release-please.outputs.tag_name }}
        run: |
          dist="gh-secrets-${VERSION}-${{ matrix.target }}"
          mkdir "$dist"
          cp "target/${{ matrix.target }}/release/gh-secrets" "$dist/"
          cp README.md LICENSE "$dist/"
          tar czf "${dist}.tar.gz" "$dist"
          shasum -a 256 "${dist}.tar.gz" > "${dist}.tar.gz.sha256"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $dist = "gh-secrets-$($env:VERSION)-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/gh-secrets.exe" "$dist/"
          Copy-Item README.md, LICENSE "$dist/"
          Compress-Archive -Path $dist -DestinationPath "${dist}.zip"
          $hash = (Get-FileHash "${dist}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${dist}.zip" | Out-File -Encoding ascii "${dist}.zip.sha256"
        env:
          VERSION: ${{ needs.release-please.outputs.tag_name }}

      - name: Attach assets to the release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          # nullglob so the archive kind this matrix leg didn't produce expands
          # to nothing instead of a literal pattern `gh` would reject.
          shopt -s nullglob
          assets=(gh-secrets-*.tar.gz gh-secrets-*.tar.gz.sha256 \
                  gh-secrets-*.zip gh-secrets-*.zip.sha256)
          gh release upload "$TAG" "${assets[@]}" \
            --clobber --repo "$GITHUB_REPOSITORY"

  # Optional: publishes to crates.io when a CARGO_REGISTRY_TOKEN secret exists.
  # No-op (with an explanatory log line) when the secret is absent, so this job
  # never blocks a release.
  crates-io:
    name: publish to crates.io
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish (if configured)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN not configured; skipping crates.io publish."
            exit 0
          fi
          cargo publish --locked
